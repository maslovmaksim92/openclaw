Открой файл и замени содержимое
Иди сюда: https://github.com/maslovmaksim92/openclaw/blob/main/.github/workflows/deploy.yml

Нажми карандаш (Edit) и замени ВСЁ содержимое на:

name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "=== Переходим в папку проекта ==="
            cd /opt/openclaw

            echo "=== Получаем последние изменения из GitHub ==="
            git pull origin main

            echo "=== Пересобираем Docker образ ==="
            docker compose build openclaw-gateway

            echo "=== Перезапускаем контейнер ==="
            docker compose up -d openclaw-gateway

            echo "=== Проверяем статус ==="
            docker compose ps
            echo "=== Деплой завершён успешно! ==="
